<VirtualHost *:80>
    ServerAdmin webmaster@localhost
    DocumentRoot /var/www/html

    <Directory /var/www/html>
        AllowOverride All
        Require all granted
    </Directory>

    # Proxy all /cobalt-api/ requests to the local Cobalt service
    ProxyPreserveHost On
    ProxyPass /cobalt-api/ http://127.0.0.1:9001/
    ProxyPassReverse /cobalt-api/ http://127.0.0.1:9001/

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>