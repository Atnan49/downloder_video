[supervisord]
nodaemon=true
user=root

[program:apache2]
command=apache2-foreground
autostart=true
autorestart=true
priority=10
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:cobalt]
command=pnpm start
directory=/var/www/html/cobalt/api
autostart=true
autorestart=true
priority=20
environment=PORT="9001"
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0